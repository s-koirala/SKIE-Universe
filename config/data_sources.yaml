# Catalog of data sources. Each entry is a candidate; availability/licensing to be audited
# by the data-sources agent before use. Nothing here is authoritative until marked `vetted: true`.

market_data:
  - name: Databento
    scope: CME MBP-10 / MBO tick, historical + live (GLBX.MDP3)
    latency: sub-ms tick
    cost_tier: pay-per-GB
    vetted: false
    notes: >
      Not directly provisioned in SKIE-Universe yet. Sibling repo
      (SKIE_Ninja research project) holds an active Databento account
      with ES 1-min history 2020-present; a derived 5-min features
      parquet was imported 2026-04-20 under the vendor_skie_ninja_legacy
      namespace (shared_data.yaml). Direct SKIE-Universe Databento
      subscription remains pending per plan §2.1.
  - name: vendor_skie_ninja_legacy (Databento-derived, via sibling repo)
    scope: ES 5-min engineered features 2020-01-01..2025-12-03 (269,594 rows, 47 non-leaky technical features + UTC ts_event)
    raw_upstream: Databento GLBX.MDP3 ES 1-min
    transform: SKIE_Ninja enhanced_feature_pipeline.py (returns/vol/momentum/volume lags; positive-lag only, sibling-repo QC-validated; SKIE-Universe verification pending — see Round-2 audit)
    tier: prototype
    evidence_bar_eligible: false
    license_status: pending-verification
    license_action_required: >
      Databento Data License Agreement must be re-read for clauses on (a) cross-project
      reuse by a single subscriber, (b) pseudonymous publication (SKIE) of derivative
      statistics. Record subscriber ID + reviewed clause in provenance sidecar before
      advancing data to evidence-bar. Source: https://databento.com/terms.
    upstream_retrieval_date: pending-documentation-from-sibling-repo (SKIE_Ninja CANONICAL_REFERENCE.md)
    import_date: 2026-04-20
    shared_subdir: vendor_skie_ninja_legacy
    vetted: true
    usability: >
      PROTOTYPE only. Acceptable inputs: H050/H051 code plumbing, walk-forward CV
      harness dev, feature-engineering sanity checks. NOT acceptable for: evidence-bar
      backtests, paper-trade submission. Rationale: features authored in sibling repo,
      not verified in SKIE-Universe per CLAUDE.md §Verification "reproduce referenced
      methods; no paraphrasing without verification."
    provenance_sidecar: vendor_skie_ninja_legacy/es_5min_features_2020_2025.provenance.json
  - name: vendor_legacy_1min (Databento raw OHLCV-1m, via sibling repo)
    scope: >
      ES 2020-2025 + NQ 2020-2024, Databento GLBX.MDP3 ohlcv-1m, 3,733,906 rows.
      Partitioned as data/processed/vendor_legacy_1min/symbol={ES,NQ}/year={YYYY}.
      Schema: ts_event (UTC), rtype, publisher_id, instrument_id, open, high, low,
      close, volume, contract_symbol (ESH0, NQM3, ...), symbol (root ES/NQ).
      Unique key (contract_symbol, ts_event).
    raw_upstream: Databento GLBX.MDP3 via sibling SKIE_Ninja databento_downloader.py
    tier: raw
    evidence_bar_eligible: false
    roll_adjustment: none (front-month concatenation only; downstream roll-adjusted derivative is the evidence-bar input)
    license_status: verified (2026-04-23 user confirmation; single-subscriber cross-project reuse permitted)
    upstream_retrieval_date: 2025-12-04 (sibling repo mtime of source CSVs)
    import_date: 2026-04-23
    shared_subdir: vendor_skie_ninja_legacy/raw_1min
    vetted: true
    usability: >
      Prototype-tier-plus: evidence-bar eligible ONLY after a downstream
      roll-adjustment step materializes a derivative dataset keyed on root
      symbol + adjusted-return series. H050/H051 code plumbing and
      walk-forward harness dev may consume the raw tier directly;
      Sharpe/Sortino claims for paper-trade submission may not. Feature
      engineering MUST be in-project (not imported from sibling) per
      CLAUDE.md §Verification.
    ingest_module: src/skie_ninja/data/ingest/vendor_legacy_1min.py
    provenance: data/processed/_provenance/vendor_legacy_1min_{YYYYMMDD}.json
    known_gap: NQ 2025 not yet pulled in sibling; extend _CANONICAL_SOURCES when available.
  - name: CME DataMine
    scope: official CME tick, historical
    cost_tier: per-dataset
    vetted: false
  - name: Polygon.io
    scope: US equities & options consolidated tape
    vetted: false
  - name: NinjaTrader feed (Rithmic / CQG / Kinetick)
    scope: live ES/NQ for paper + live trading
    vetted: false

options_and_gex:
  - name: CBOE DataShop
    scope: SPX option trades & quotes (OPRA subset), 0DTE
    vetted: false
  - name: SpotGamma / Menthor Q
    scope: aggregated dealer GEX levels
    vetted: false

macro_surprise:
  - name: Bloomberg ECO (terminal-only)
    scope: consensus + actual for every macro release
    vetted: false
  - name: Trading Economics API
    scope: public-tier consensus/actual
    vetted: false

text_and_llm:
  - name: FOMC statements / minutes (federalreserve.gov)
    cadence: 8 FOMC + 8 minutes releases/yr
    parser: html + pdf
  - name: ECB press conference transcripts
  - name: BLS / BEA release text (NFP, CPI, PCE, GDP)
  - name: FinBERT / Voyage-finance-2 / FinLang
    role: embedding model choice (select by empirical IR on internal corpus)

altdata:
  - name: AIS (MarineTraffic / Spire / AISHub)
    scope: vessel arrival events at Cushing/Ras Tanura/Rotterdam
    horizon: minute
    relevance: CL/BZ; indirect ES/NQ via oil beta
  - name: Glassnode / Dune / Etherscan
    scope: stablecoin mint/burn, CEX in/out flows
    relevance: BTC futures basis; indirect ES via BTC-risk correlation
  - name: HRRR / ERCOT real-time
    scope: weather & nodal LMP
    relevance: NG; indirect ES via commodity beta

prediction_markets:
  - name: Kalshi
    scope: macro contracts (CPI, FOMC, NFP, S&P close)
    api: REST + WS public
  - name: Polymarket
    scope: macro & geopolitical
    api: on-chain (Polygon)

on_chain_stablecoin:
  - name: Tether treasury transactions
  - name: Circle USDC mint/burn

reference:
  - name: FRED
    scope: SOFR, IOER, repo rates, Treasury curve
  - name: TreasuryDirect
    scope: auction schedule, results, WI yield history
  - name: ALFRED (FRED vintage archive)
    scope: real-time vintage data for macro series (GDP, CPI, NFP, etc.)
    url: https://alfred.stlouisfed.org/
    license: public domain
    retrieval_date: 2026-04-16
    shared_subdir: fred
    vetted: true
    notes: >
      Vintage series enable point-in-time macro feature construction
      without look-ahead bias. API key required (free registration).
  - name: Philadelphia Fed Survey of Professional Forecasters (SPF)
    scope: quarterly consensus forecasts for GDP, CPI, unemployment, Treasury yields
    url: https://www.philadelphiafed.org/surveys-and-data/real-time-data-research/survey-of-professional-forecasters
    license: public domain
    retrieval_date: 2026-04-16
    shared_subdir: spf
    vetted: true
    notes: >
      Individual-level responses available. Useful for consensus dispersion
      and disagreement signals (Patton & Timmermann 2010).
  - name: FOMC statements and minutes (federalreserve.gov)
    scope: all FOMC statements, minutes, press conference transcripts
    url: https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm
    license: public domain (U.S. government work)
    retrieval_date: 2026-04-16
    shared_subdir: fomc_text
    vetted: true
    notes: >
      HTML and PDF. Statements available same-day; minutes released
      three weeks after meeting. Transcripts released with five-year lag.
