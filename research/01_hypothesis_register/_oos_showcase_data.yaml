# SKIE-Universe Best-OOS Showcase — Structured Data
#
# Machine-readable headline data per emitted KPI report card. Read by
# scripts/showcase_best_oos.py to regenerate BEST_OOS.md at repo root.
#
# Per ADR-0024 D-8: every emitted KPI report card MUST have a row here at
# emission time. Per ADR-0013 §4.1 non-loss: when a card is superseded, its
# row is preserved with `superseded_by: <version>` annotation, never deleted.
#
# Source of truth for the numbers is the per-hypothesis KPI report card
# markdown body (which is itself frozen at emission per ADR-0013 §4.1).
# Values here are a machine-readable cache; in case of divergence between
# this YAML and the underlying report card, the report card wins and the
# YAML is corrected. Tracked under P1-BEST-OOS-SHOWCASE-SCHEMA-FROZEN-DATACLASS.
#
# Schema:
#   cards: list of card entries, each with:
#     hypothesis_id: H<NNN>
#     version: integer
#     date: ISO date
#     report_card_path: relative to repo root
#     run_id: run UUID string (or null if pre-emission)
#     paradigm: one of {adr-0017-survival, adr-0024-aggressive-growth, hybrid}
#     hypothesis_of_record_arm: short label per design.md §1
#     strongest_cell: short label of the cell with highest realized OOS end equity %
#       (note: "highest" = least negative for net-loss hypotheses; e.g. H050's strongest
#       is NQ unconditional at -25.60% NOT ES unconditional at -43.69%; per the
#       _rank_key descending-by-pct semantic in scripts/showcase_best_oos.py)
#     realized:
#       strongest_cell_pct: % return of strongest cell (signed; e.g. +89.43)
#       strongest_cell_max_dd_pct: max-DD of strongest cell (positive number)
#       hypothesis_of_record_arm_pct: % return of hypothesis-of-record arm on the SAME
#         symbol as strongest_cell (single-scalar; per-symbol-asymmetric arms are
#         disambiguated by reporting the symbol matching strongest_cell). When the
#         hypothesis-of-record spans two symbols (e.g. H050 HMM-gated ES+NQ), this
#         field reports the value on the symbol that won strongest_cell.
#       oos_sessions: OOS session count on the same symbol as strongest_cell (context, not ranking)
#     forward_projection:
#       p_loss_pct: forward 252-session P(loss) on strongest cell (null if not reported)
#     fitness:
#       mppm_rho1_point: MPPM(ρ=1) point estimate (null if not computed)
#       mppm_rho1_ci_low: CI lower bound (null if not computed)
#       mppm_rho1_ci_high: CI upper bound (null if not computed)
#       sharpe_ann_strongest_cell: annualized Sharpe on strongest cell (null if not reported)
#     primary_annotations: list of canonical KPI annotations from §9 of the report card
#     cost_model: short label (e.g. "futures_orb_v1", "zero_cost_v1")
#     superseded_by: null or "<hypothesis_id>_kpi_report_v<N>.md" string
#
# Note on `paradigm` tag: reflects the ADR framework in force at KPI emission time
#   (not the current canonical paradigm). Per ADR-0024 §Consequences retroactive
#   labeling table, KPI cards emitted before 2026-05-15 are tagged adr-0017-survival
#   regardless of whether a future v{N+1} cascade re-emits them under adr-0024-
#   aggressive-growth framing.

